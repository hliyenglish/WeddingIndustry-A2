            { type: 'breakdown', title: "Monologue Breakdown", num: 7, role: "Planner", 
              sentence: "If the client is okay, you can take your break.", blankRatio: 0.35,
              ipa: "/ɪf ðə ˈklaɪənt ɪz oʊˈkeɪ, juː kæn teɪk jɔːr breɪk./", voice: "planner",
              qType: "Yes/No", qText: "Can you take a break if the client is not okay?", qAns: "No, only if the client is okay.", qIpa: "/nəʊ, ˈoʊnli ɪf ðə ˈklaɪənt ɪz oʊˈkeɪ./" },
            { type: 'breakdown', title: "Monologue Breakdown", num: 8, role: "Planner", 
              sentence: "A happy client makes our job much easier.", blankRatio: 0.35,
              ipa: "/ə ˈhæpi ˈklaɪənt meɪks aʊər dʒɒb mʌtʃ ˈiːziər./", voice: "planner",
              qType: "Wh-", qText: "What makes our job easier?", qAns: "A happy client.", qIpa: "/ə ˈhæpi ˈklaɪənt./" },
            
            // Slide 37
            { type: 'full-script', title: "Monologue: Script", script: monologuePlanner },
            
            // Slide 38
            { type: 'speaking', title: "Speaking Activity", icon: "microphone-alt", text: "Why is client care important during a long photoshoot? Tell me your thoughts." },

            // Slide 39
            { type: 'list', title: "Application & Expansion (Part 1)", level: "Level A2", items: [
                "1. When do you take your break at Xoai Wedding?",
                "2. What do you ask the client before you take a break?",
                "3. How do you help a client who feels very tired?",
                "4. Can you bring a client a glass of water and a chair? How do you ask?",
                "5. Why do we need to tell the manager before taking a break?"
            ]},
            
            // Slide 40
            { type: 'list', title: "Application & Expansion (Part 2)", level: "Level A2", items: [
                "1. Practice: You want to take a break. Talk to your manager.",
                "2. Practice: You see a client standing for a long time. Offer them a chair.",
                "3. Practice: The client says they are thirsty. What do you do?",
                "4. What makes a client feel happy and comfortable?",
                "5. Talk about a time you helped a client at work."
            ]}
        ];

        // --- RENDER LOGIC ---
        const container = document.getElementById('slides-wrapper');
        
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        let hiddenTargetWords = new Set();

        function generateBlankSentence(sentence, ratio) {
            const targetWords = ['break', 'manager', 'client', 'water', 'care', 'important', 'happy', 'comfortable', 'thirty', 'minute', 'coffee', 'fine', 'dress', 'hot', 'cold', 'kind', 'chair', 'rest', 'easier', 'leaving'];
            const words = sentence.split(' ');
            const numToHide = Math.max(1, Math.round(words.length * ratio));
            
            const wordData = words.map((w, i) => {
                const cleanWord = w.replace(/[^a-zA-Z]/g, '');
                return { index: i, original: w, clean: cleanWord, length: cleanWord.length };
            });
            
            const sortedByLen = [...wordData].sort((a, b) => {
                const aClean = a.clean.toLowerCase();
                const bClean = b.clean.toLowerCase();
                const aIsTarget = (targetWords.includes(aClean) && !hiddenTargetWords.has(aClean)) ? 1 : 0;
                const bIsTarget = (targetWords.includes(bClean) && !hiddenTargetWords.has(bClean)) ? 1 : 0;
                if (aIsTarget !== bIsTarget) return bIsTarget - aIsTarget;
                return b.length - a.length;
            });
            const hideIndices = sortedByLen.slice(0, numToHide).map(w => w.index);
            
            hideIndices.forEach(idx => {
                const cleanWord = wordData[idx].clean.toLowerCase();
                if (targetWords.includes(cleanWord)) {
                    hiddenTargetWords.add(cleanWord);
                }
            });
            
            let html = '<div class="flex flex-wrap items-center gap-x-2 gap-y-4 leading-loose text-xl font-medium text-gray-800 w-full">';
            
            words.forEach((w, index) => {
                if (hideIndices.includes(index) && wordData[index].length > 0) {
                    const match = w.match(/^([^a-zA-Z]*)([a-zA-Z\-]+)([^a-zA-Z]*)$/);
                    if (match) {
                        const prefix = match[1];
                        const word = match[2];
                        const suffix = match[3];
                        const wPx = Math.max(40, word.length * 15 + 10); 
                        html += `<span class="inline-flex items-center">${prefix}<input type="text" class="dictation-input border-b-2 border-gray-300 focus:border-teal-500 bg-transparent text-center text-teal-600 font-bold outline-none px-1" style="width: ${wPx}px;" data-answer="${escapeHTML(word.toLowerCase())}">${suffix}</span>`;
                    } else { html += `<span>${w}</span>`; }
                } else { html += `<span>${w}</span>`; }
            });

            html += `<button class="check-btn ml-2 shrink-0 w-9 h-9 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 transition-colors tooltip" title="Check All"><i class="fas fa-check"></i></button></div>`;
            return html;
        }

        function renderSlides() {
            hiddenTargetWords.clear();
            let html = '';
            slidesData.forEach((slide, index) => {
                html += `<div class="slide-panel w-full h-full p-4 md:p-12 flex-col justify-center overflow-y-auto relative bg-white" id="slide-${index}">`;
                
                if (slide.type === 'title') {
                    html += `
                        <div class="text-center">
                            <div class="w-24 h-24 bg-${slide.color}-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                <i class="fas fa-mug-hot text-4xl text-${slide.color}-500"></i>
                            </div>
                            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">${slide.title}</h1>
                            <p class="text-xl text-gray-500">${slide.subtitle}</p>
                        </div>
                    `;
                } 
                else if (slide.type === 'list') {
                    html += `
                        <h2 class="text-3xl font-bold text-blue-600 mb-2">${slide.title}</h2>
                        <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded mb-8 uppercase font-bold tracking-wider">${slide.level}</span>
                        <ul class="space-y-6 text-lg text-gray-700">
                            ${slide.items.map(item => `<li class="flex items-start gap-4"><i class="fas fa-star text-amber-400 mt-1"></i> <span>${item}</span></li>`).join('')}
                        </ul>
                    `;
                }
                else if (slide.type === 'prediction') {
                    html += `
                        <h2 class="text-3xl font-bold text-rose-500 mb-4">${slide.title}</h2>
                        <p class="text-lg text-gray-600 mb-8">${slide.desc}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 w-full max-w-4xl mx-auto">
                            ${slide.images.map(img => `
                                <div class="aspect-square rounded-2xl overflow-hidden shadow-md border-4 border-rose-50">
                                    <img src="${img}" class="w-full h-full object-cover" alt="Prediction image" loading="lazy">
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                else if (slide.type === 'audio-mcq') {
                    html += `
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-3xl font-bold text-blue-600">${slide.title}</h2>
                            <button class="bg-rose-500 hover:bg-rose-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-105 tts-dialogue-btn" 
                                    data-slide-index="${index}">
                                <i class="fas fa-play text-xl ml-1"></i>
                            </button>
                        </div>
                        <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                            <p class="text-xl font-semibold text-gray-800 mb-6">${slide.question}</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mcq-container">
                                ${slide.options.map((opt, i) => `
                                    <button class="mcq-btn text-left p-4 rounded-lg border-2 border-gray-200 hover:border-blue-400 bg-white transition-all flex items-center justify-between" 
                                            data-correct="${i === slide.answer}">
                                        <span class="text-lg">${opt}</span>
                                        <i class="fas fa-circle text-gray-300 status-icon"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'breakdown') {
                    const roleColor = slide.role === 'Staff' ? 'teal' : (slide.role === 'Planner' ? 'indigo' : 'rose');
                    html += `
                        <div class="absolute top-4 left-4 md:top-8 md:left-8 text-xs md:text-sm font-bold text-gray-400">Sentence ${slide.num}</div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-4 md:mb-8 border-b pb-2 md:pb-4 mt-6 md:mt-0">${slide.title}</h2>
                        
                        <div class="mb-10 p-6 bg-${roleColor}-50 rounded-xl border border-${roleColor}-100 relative">
                            <span class="absolute -top-3 left-6 bg-${roleColor}-500 text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm uppercase">${slide.role}</span>
                            
                            <div class="mt-4 mb-6 flex flex-col gap-4 w-full">
                                ${generateBlankSentence(slide.sentence, slide.blankRatio)}
                            </div>
                            
                            <div class="flex flex-wrap gap-2 md:gap-3 no-print mt-2">
                                <button class="toggle-btn bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50 flex items-center gap-2">
                                    <i class="fas fa-eye"></i> Show Text & IPA
                                </button>
                                <button class="tts-btn bg-${roleColor}-100 text-${roleColor}-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-${roleColor}-200 flex items-center gap-2"
                                        data-text="${escapeHTML(slide.sentence)}" data-voice="${slide.voice}">
                                    <i class="fas fa-volume-up"></i> Listen
                                </button>
                                <button class="bg-gray-800 text-white w-10 h-10 rounded-lg flex items-center justify-center hover:bg-red-500 transition-colors tooltip" title="Record (Mock)">
                                    <i class="fas fa-microphone"></i>
                                </button>
                            </div>
                            
                            <div class="hidden-content hidden mt-6 p-4 bg-white rounded-lg border border-gray-100 shadow-inner">
                                <p class="text-gray-800 font-medium mb-1">${slide.sentence}</p>
                                <p class="text-gray-500 font-mono text-sm">${slide.ipa}</p>
                            </div>
                        </div>

                        <!-- Comprehension Question -->
                        <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="bg-gray-700 text-white text-xs px-2 py-1 rounded font-bold">${slide.qType} Q</span>
                                <p class="font-semibold text-gray-800">${slide.qText}</p>
                            </div>
                            <div class="flex items-center gap-3 no-print">
                                <button class="toggle-btn bg-white border border-gray-300 text-gray-600 px-3 py-1.5 rounded-md text-sm hover:bg-gray-100 flex items-center gap-2">
                                    <i class="fas fa-eye"></i> Answer
                                </button>
                            </div>
                            <div class="hidden-content hidden mt-3 bg-white p-3 rounded border border-gray-100">
                                <div class="flex items-center gap-3">
                                    <p class="text-blue-600 font-bold flex-grow">${slide.qAns}</p>
                                    <button class="tts-btn text-gray-400 hover:text-blue-500 transition-colors" data-text="${escapeHTML(slide.qAns)}" data-voice="${slide.voice}">
                                        <i class="fas fa-volume-up"></i>
                                    </button>
                                </div>
                                <p class="text-gray-400 font-mono text-xs mt-1">${slide.qIpa}</p>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'full-script') {
                    html += `
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2>
                            <button class="bg-teal-500 hover:bg-teal-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-105 tts-dialogue-btn"
                                    data-slide-index="${index}">
                                <i class="fas fa-play ml-1"></i>
                            </button>
                        </div>
                        <div class="bg-gray-50 rounded-xl p-6 h-[60vh] overflow-y-auto custom-scrollbar border border-gray-200">
                            <div class="space-y-4">
                                ${slide.script.map(line => {
                                    const c = line.r === 'Staff' ? 'text-teal-600' : (line.r === 'Planner' ? 'text-indigo-600' : 'text-rose-500');
                                    return `<div class="flex gap-4">
                                        <span class="font-bold w-20 shrink-0 ${c}">${line.r}:</span>
                                        <span class="text-gray-700">${line.t}</span>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'speaking') {
                    html += `
                        <div class="flex flex-col items-center justify-center h-full text-center">
                            <div class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mb-8 shadow-inner">
                                <i class="fas fa-${slide.icon} text-5xl text-amber-500"></i>
                            </div>
                            <h2 class="text-3xl font-bold text-gray-800 mb-6">${slide.title}</h2>
                            <div class="bg-white p-8 rounded-2xl shadow-lg border border-amber-50 max-w-3xl relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-2 h-full bg-amber-400"></div>
                                <p class="text-2xl text-gray-700 font-medium leading-relaxed italic">"${slide.text}"</p>
                            </div>
                        </div>
                    `;
                }
                html += `</div>`;
            });
            container.innerHTML = html;
            attachEventListeners();
        }

        // --- INTERACTIVITY LOGIC ---
        let currentSlide = 0;
        const totalSlides = slidesData.length;

        function updateNav() {
            document.querySelectorAll('.slide-panel').forEach((el, index) => {
                el.classList.toggle('active', index === currentSlide);
            });
            document.getElementById('current-slide-num').innerText = currentSlide + 1;
            document.getElementById('prev-btn').disabled = currentSlide === 0;
            document.getElementById('next-btn').disabled = currentSlide === totalSlides - 1;
        }

        function navigate(dir) {
            cancelAudioSafe(); 
            currentSlide += dir;
            if (currentSlide < 0) currentSlide = 0;
            if (currentSlide >= totalSlides) currentSlide = totalSlides - 1;
            updateNav();
        }

        function attachEventListeners() {
            document.querySelectorAll('.mcq-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const parent = this.closest('.mcq-container');
                    parent.querySelectorAll('.mcq-btn').forEach(b => {
                        b.classList.remove('border-green-500', 'bg-green-50', 'border-red-500', 'bg-red-50');
                        b.querySelector('.status-icon').className = 'fas fa-circle text-gray-300 status-icon';
                    });
                    
                    const isCorrect = this.dataset.correct === 'true';
                    const icon = this.querySelector('.status-icon');
                    
                    if (isCorrect) {
                        this.classList.add('border-green-500', 'bg-green-50');
                        icon.className = 'fas fa-check-circle text-green-500 status-icon text-xl';
                    } else {
                        this.classList.add('border-red-500', 'bg-red-50');
                        icon.className = 'fas fa-times-circle text-red-500 status-icon text-xl';
                    }
                });
            });

            document.querySelectorAll('.check-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const container = this.parentElement;
                    const inputs = container.querySelectorAll('.dictation-input');
                    let allCorrect = true;

                    inputs.forEach(input => {
                        const correctAns = input.dataset.answer.toLowerCase();
                        const userVal = input.value.trim().toLowerCase();
                        
                        if (userVal === correctAns) {
                            input.classList.remove('text-red-500', 'border-red-300', 'text-teal-600');
                            input.classList.add('text-green-600', 'border-green-300');
                        } else {
                            input.classList.remove('text-green-600', 'border-green-300', 'text-teal-600');
                            input.classList.add('text-red-500', 'border-red-300');
                            allCorrect = false;
                        }
                    });

                    const icon = this.querySelector('i');
                    if (allCorrect && inputs.length > 0) {
                        this.classList.replace('bg-gray-100', 'bg-green-100');
                        this.classList.replace('text-gray-500', 'text-green-600');
                        icon.className = 'fas fa-check';
                    } else {
                        this.classList.replace('bg-gray-100', 'bg-red-100');
                        this.classList.replace('text-gray-500', 'text-red-600');
                        icon.className = 'fas fa-times';
                    }
                });
            });

            document.querySelectorAll('.dictation-input').forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const container = this.closest('div');
                        if (container) {
                            const checkBtn = container.querySelector('.check-btn');
                            if (checkBtn) checkBtn.click();
                        }
                    }
                });
            });

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const target = this.parentElement.nextElementSibling;
                    if(target && target.classList.contains('hidden-content')){
                        target.classList.toggle('hidden');
                        const icon = this.querySelector('i');
                        if (target.classList.contains('hidden')) {
                            icon.classList.replace('fa-eye-slash', 'fa-eye');
                        } else {
                            icon.classList.replace('fa-eye', 'fa-eye-slash');
                        }
                    }
                });
            });

            document.querySelectorAll('.tts-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const text = this.getAttribute('data-text');
                    const voiceRole = this.getAttribute('data-voice');
                    playTTS(text, voiceRole);
                });
            });

            document.querySelectorAll('.tts-dialogue-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    cancelAudioSafe(); 
                    const index = parseInt(this.getAttribute('data-slide-index'));
                    if (slidesData[index] && slidesData[index].script) {
                        currentDialogue = slidesData[index].script;
                        dialogueIndex = 0;
                        setTimeout(playDialogueSequence, 50);
                    }
                });
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName.toLowerCase() === 'input') return;
            if (e.key === 'ArrowRight') navigate(1);
            else if (e.key === 'ArrowLeft') navigate(-1);
        });

        // --- WEB SPEECH API & TTS LOGIC ---
        let synth = window.speechSynthesis;
        let availableVoices = [];
        
        let currentDialogue = [];
        let dialogueIndex = 0;
        
        window.speechUtterances = []; 

        function populateVoiceList() {
            availableVoices = synth.getVoices();
            if (availableVoices.length === 0) return;

            const enVoices = availableVoices.filter(v => v.lang.startsWith('en-'));
            
            const displayList = enVoices;

            const configs = [
                { id: 'voice-staff', priorities: ['Emma', 'Jenny', 'Samantha', 'Nicky', 'Moira', 'Google US English', 'Female'] },
                { id: 'voice-manager', priorities: ['Andrew', 'Guy', 'Brian', 'Alex', 'Daniel', 'Aaron', 'Google UK English Male', 'Male'] },
                { id: 'voice-client', priorities: ['Jenny', 'Emma', 'Karen', 'Tessa', 'Catherine', 'Martha', 'Google UK English Female', 'Female'] },
                { id: 'voice-planner', priorities: ['Brian Natural', 'Brian', 'Andrew', 'Arthur', 'Gordon', 'Fred', 'Male'] }
            ];
            
            configs.forEach(config => {
                const selectEl = document.getElementById(config.id);
                if (!selectEl) return;
                
                const prevValue = selectEl.value; 
                selectEl.innerHTML = ''; 
                
                displayList.forEach(voice => {
                    const option = document.createElement('option');
                    option.textContent = `${voice.name} (${voice.lang})`;
                    option.value = voice.voiceURI;
                    selectEl.appendChild(option);
                });
                
                let bestMatchIndex = -1;
                for (let keyword of config.priorities) {
                    bestMatchIndex = Array.from(selectEl.options).findIndex(opt => opt.textContent.includes(keyword));
                    if (bestMatchIndex !== -1) {
                        break;
                    }
                }
                
                if (bestMatchIndex !== -1) {
                    selectEl.selectedIndex = bestMatchIndex;
                } else if (selectEl.options.length > 0) {
                    selectEl.selectedIndex = 0;
                }

                if (prevValue && selectEl.querySelector(`option[value="${prevValue}"]`)) {
                    selectEl.value = prevValue;
                }
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function getVoiceForRole(role) {
            if (!role || availableVoices.length === 0) return null;
            
            const selectId = `voice-${role.toLowerCase()}`;
            const selectEl = document.getElementById(selectId);
            
            if (selectEl && selectEl.value) {
                const voice = availableVoices.find(v => v.voiceURI === selectEl.value);
                if (voice) return voice;
            }
            
            return availableVoices.find(v => v.lang.startsWith('en-')) || availableVoices[0];
        }

        function cancelAudioSafe() {
            window.speechSynthesis.pause();
            window.speechSynthesis.cancel();
            currentDialogue = [];
            window.speechUtterances = [];
        }

        function playTTS(text, role) {
            cancelAudioSafe();
            if (text === '') return;
            
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                const voice = getVoiceForRole(role);
                if (voice) utterance.voice = voice;
                utterance.rate = 0.8; // Set voice rate to 0.8 as requested
                
                window.speechUtterances.push(utterance);
                
                utterance.onend = function() {
                    const index = window.speechUtterances.indexOf(utterance);
                    if (index > -1) {
                        window.speechUtterances.splice(index, 1);
                    }
                };
                
                synth.speak(utterance);
            }, 50);
        }

        function playDialogueSequence() {
            if (dialogueIndex >= currentDialogue.length) {
                currentDialogue = [];
                return; 
            }
            
            const line = currentDialogue[dialogueIndex];
            const utterance = new SpeechSynthesisUtterance(line.t);
            const voice = getVoiceForRole(line.r);
            if (voice) utterance.voice = voice;
            utterance.rate = 0.8; // Set voice rate to 0.8 as requested
            
            window.speechUtterances.push(utterance);

            utterance.onend = function() {
                const index = window.speechUtterances.indexOf(utterance);
                if (index > -1) {
                    window.speechUtterances.splice(index, 1);
                }
                dialogueIndex++;
                playDialogueSequence(); 
            };
            
            utterance.onerror = function(e) {
                console.error("SpeechSynthesisUtterance.onerror", e);
                dialogueIndex++;
                playDialogueSequence(); 
            };

            synth.speak(utterance);
        }

        // --- SETTINGS MODAL ---
        function openSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            document.getElementById('settings-modal').classList.add('flex');
            populateVoiceList();
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
            document.getElementById('settings-modal').classList.remove('flex');
        }

        // --- INIT ---
        window.addEventListener('load', () => {
            renderSlides();
            updateNav();
            setTimeout(populateVoiceList, 100);
        });

    </script>
</body>
